<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body  class="startup-package-page">
<div id="navbar"></div>
<section class="investor-contact-section">
    <div class="container">
        <div class="row align-items-start">
            <!-- Left Card -->
            <div class="col-lg-4">
                <div class="investor-contact-card">
    
                    <div class="investor-contact-overlay">

                        <span class="investor-contact-subtitle">
                            CONTACT US
                        </span>

                        <h2 class="investor-contact-title">
                            Take Your <br>
                            First Step
                        </h2>

                        <p class="investor-contact-description">
                            Send your message to us and we'll get back to you
                            with a personalized solution.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Right Form -->
            <div class="col-lg-8">

                <form class="investor-contact-form">

                    <div class="row">

                        <div class="col-md-5 mb-4">

                            <label class="investor-form-label">
                                Name <span>*</span>
                            </label>

                            <input type="text"
                                   class="form-control investor-form-control"
                                   placeholder="Name">

                        </div>

                        <div class="col-md-5 mb-4">

                            <label class="investor-form-label">
                                Email <span>*</span>
                            </label>

                            <input type="email"
                                   class="form-control investor-form-control"
                                   placeholder="Email">

                        </div>

                        <div class="col-md-5 mb-4">

                            <label class="investor-form-label">
                                Phone Number <span>*</span>
                            </label>

                            <input type="text"
                                   class="form-control investor-form-control"
                                   placeholder="Phone Number">

                        </div>

                        <div class="col-md-5 mb-4">

                            <label class="investor-form-label">
                                Company Name
                            </label>

                            <input type="text"
                                   class="form-control investor-form-control"
                                   placeholder="Company Name">

                        </div>

                        <div class="col-10 mb-4">

                            <label class="investor-form-label">
                                Category
                            </label>

                            <select class="form-select investor-form-select">
                                <option>Select Category</option>
                            </select>

                        </div>

                        <div class="col-10 mb-4">

                            <label class="investor-form-label">
                                Message <span>*</span>
                            </label>

                            <textarea
                                class="form-control investor-form-textarea"
                                rows="5"
                                placeholder="Type your message here..."></textarea>

                        </div>

                        <div class="col-10">

                            <div class="investor-checkbox">

                                <input type="checkbox">

                                <label>
                                    I agree to
                                    <a href="#">Terms & Conditions</a>
                                </label>

                            </div>

                        </div>

                        <div class="col-10 mt-4">

                            <div class="investor-captcha-box">

                                <input type="checkbox">

                                <span>I'm not a robot</span>

                                <img src="\images\captch.png"
                                     alt="reCAPTCHA">

                            </div>

                        </div>
                        <div class="col-10 mt-4">

                            <button class="investor-submit-btn">
                                Submit form
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>
    </div>
</section>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
fetch("navbar.html")
.then(response => response.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
fetch("footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>
</body>
</html>
