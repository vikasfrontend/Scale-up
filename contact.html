<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section class="contact-section">

    <div class="container">

        <div class="row g-4">

            <div class="col-lg-6">

                <div class="contact-left">

                    <h2>
                        Take the
                        <span>First Step</span>
                    </h2>

                    <p>
                        Your entrepreneurial journey starts here. Whether
                        you're setting up your business, planning finances,
                        or seeking investor introductions, Epidiosis is your
                        trusted partner.
                    </p>

        <div class="contact-shapes">
    <div class="shape-white"></div>
    <div class="shape-large"></div>
    <div class="shape-white"></div>
    <div class="shape-small"></div>
</div>

                </div>

            </div>

            <div class="col-lg-6">

                <div class="contact-form">

                   <form>

    <div class="mb-3">

        <input type="text"
            class="form-control contact-input"
            placeholder="FULL NAME">

    </div>

    <div class="mb-3">

        <input type="tel"
            class="form-control contact-input"
            placeholder="PHONE">

    </div>

    <div class="mb-3">

        <input type="email"
            class="form-control contact-input"
            placeholder="EMAIL">

    </div>

    <div class="mb-4">

        <textarea
            class="form-control contact-message"
            rows="5"
            placeholder="MESSAGE"></textarea>

    </div>

    <button type="submit" class="contact-btn">

        Send message

    </button>

    <p class="contact-text">

        We'll get in touch with you soon.

    </p>

</form>
          

                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
